<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QClaw · 空投申领</title>
    <!-- 预连接 CDN，加速加载 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- 图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <style>
        /* ── 重置 & 基础 ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        /* 背景光效 */
        body::before {
            content: '';
            position: fixed;
            top: -60%; left: -20%;
            width: 140%; height: 80%;
            background: radial-gradient(ellipse at 50% -20%, rgba(107,79,216,0.14) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            background: #13132b;
            border: 1px solid rgba(107,79,216,0.22);
            border-radius: 20px;
            padding: 26px 22px;
            width: 100%; max-width: 440px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        /* 顶部彩虹线 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #e94560 30%, #6b4fd8 70%, transparent);
        }

        /* ── 标题 ── */
        .card h1 {
            font-size: 22px; text-align: center; margin-bottom: 2px;
            background: linear-gradient(135deg, #e94560, #6b4fd8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center; color: #444; font-size: 11px;
            margin-bottom: 18px; letter-spacing: 3px; text-transform: uppercase;
        }

        /* ── 钱包栏 ── */
        .wallet-bar {
            display: flex; align-items: center; gap: 8px;
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
            font-size: 12px; min-height: 40px;
        }
        .wallet-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #333; flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .wallet-dot.ok  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .wallet-dot.err  { background: #f87171; }
        .wallet-dot.loading { background: #facc15; animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .wallet-addr { color: #666; transition: color 0.3s; }
        .wallet-addr.ok { color: #4cc9f0; font-family: monospace; font-size: 11px; }

        /* ── 邀请人 banner ── */
        .referrer-banner {
            background: linear-gradient(135deg, #1c0d3a, #2d1b69);
            border: 1px solid rgba(107,79,216,0.5);
            border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
            font-size: 13px; color: #c4b5fd; text-align: center;
            display: none; align-items: center; justify-content: center; gap: 8px;
            animation: slideIn 0.25s ease-out;
        }
        .referrer-banner.show { display: flex; }
        .referrer-banner .close-btn {
            margin-left: auto; background: none; border: none;
            color: #6b4fd8; cursor: pointer; font-size: 16px; line-height: 1;
            padding: 0 2px; flex-shrink: 0;
        }
        .referrer-banner .close-btn:hover { color: #e94560; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

        /* ── 合约信息 ── */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; margin-bottom: 14px;
        }
        .info-card {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 10px 12px;
        }
        .info-card .label {
            color: #444; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px;
        }
        .info-card .val { font-size: 13px; font-weight: 600; color: #4cc9f0; }
        .info-card .val.accent { color: #e94560; }

        /* ── 倒计时 ── */
        .cd-bar {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
            text-align: center; font-size: 12px; color: #444;
        }
        .cd-bar .time {
            font-size: 20px; font-weight: bold; color: #e94560;
            letter-spacing: 2px; margin-top: 4px;
        }

        /* ── 输入 ── */
        .input-section { margin-bottom: 14px; }
        .input-section label {
            display: block; font-size: 11px; color: #444; margin-bottom: 7px;
        }
        .input-row {
            display: flex; align-items: center;
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: #6b4fd8; }
        .input-row .unit {
            padding: 0 16px; font-size: 16px; color: #444;
            flex-shrink: 0;
        }
        .input-row input {
            flex: 1; background: transparent; border: none;
            padding: 14px 16px; font-size: 22px; color: #fff;
            outline: none; text-align: right; width: 0;
        }
        .input-row input:disabled { color: #444; }

        /* ── 预览 ── */
        .preview {
            background: linear-gradient(135deg, rgba(107,79,216,0.12), rgba(233,69,96,0.08));
            border: 1px solid rgba(107,79,216,0.18);
            border-radius: 10px; padding: 14px;
            margin-bottom: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .preview .label { color: #444; font-size: 12px; }
        .preview .amount { font-size: 24px; font-weight: bold; color: #e94560; }
        .preview .amount span { font-size: 13px; color: #666; }

        /* ── 按钮 ── */
        .btn-main {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #e94560, #b8274a);
            color: #fff; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .btn-main:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(233,69,96,0.38);
        }
        .btn-main:active:not(:disabled) { transform: translateY(0); }
        .btn-main:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-invite {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #6b4fd8, #4a35a0);
            color: #fff; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 1px; margin-bottom: 6px;
            display: none;
        }
        .btn-invite.show { display: block; }
        .btn-invite:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(107,79,216,0.38);
            transform: translateY(-1px);
        }

        .hint {
            text-align: center; color: #e94560; font-size: 11px;
            margin-bottom: 14px; display: none;
        }

        /* ── 状态框 ── */
        .status {
            margin-top: 10px; padding: 12px; border-radius: 10px;
            font-size: 12px; display: none; line-height: 1.6; word-break: break-all;
        }
        .status.ok  { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.2);  color: #4ade80; }
        .status.err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #f87171; }
        .status.info{ background: rgba(76,201,240,0.1);  border: 1px solid rgba(76,201,240,0.2);  color: #4cc9f0; }
        .status a   { color: #4cc9f0; }

        /* ── 邀请专区 ── */
        .invite-section {
            border-top: 1px solid #1e1e3a;
            padding-top: 16px; margin-top: 16px;
            display: none;
        }
        .invite-section.show { display: block; }

        .invite-title {
            font-size: 12px; color: #6b4fd8; text-align: center;
            margin-bottom: 14px; letter-spacing: 3px; text-transform: uppercase;
        }

        .count-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .count-box {
            flex: 1;
            background: linear-gradient(160deg, rgba(107,79,216,0.14), rgba(107,79,216,0.04));
            border: 1px solid rgba(107,79,216,0.2);
            border-radius: 10px; padding: 14px 8px; text-align: center;
        }
        .count-box .num { font-size: 30px; font-weight: bold; color: #a78bfa; display: block; line-height: 1; }
        .count-box .desc {
            font-size: 10px; color: #444; text-transform: uppercase;
            letter-spacing: 1px; margin-top: 6px; display: block;
        }

        .link-box {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 10px; padding: 12px; margin-bottom: 10px;
        }
        .link-box label {
            font-size: 10px; color: #444; text-transform: uppercase;
            letter-spacing: 1px; display: block; margin-bottom: 6px;
        }
        .link-row { display: flex; gap: 8px; }
        .link-row input {
            flex: 1; background: #0a0a1a; border: 1px solid #2a2a4a;
            border-radius: 8px; padding: 9px 12px; color: #7c6fcd;
            font-size: 11px; font-family: monospace; outline: none;
        }
        .btn-copy {
            padding: 9px 14px; background: #6b4fd8; color: #fff;
            border: none; border-radius: 8px; font-size: 12px;
            cursor: pointer; white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-copy:hover { background: #5a3fc0; }

        .share-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .share-btn {
            flex: 1; padding: 9px; border: none; border-radius: 8px;
            font-size: 12px; cursor: pointer; text-align: center; color: #fff;
            transition: opacity 0.15s;
        }
        .share-btn:hover { opacity: 0.85; }
        .share-btn.tg { background: #2ca5e0; }
        .share-btn.tw { background: #1da1f2; }

        .btn-refresh {
            width: 100%; padding: 8px; background: #0d0d20;
            border: 1px solid #1e1e3a; border-radius: 8px;
            color: #444; font-size: 12px; cursor: pointer;
            margin-bottom: 10px; transition: color 0.15s, border-color 0.15s;
        }
        .btn-refresh:hover { color: #4cc9f0; border-color: rgba(76,201,240,0.4); }

        .diag-box {
            background: rgba(74,222,128,0.07);
            border: 1px solid rgba(74,222,128,0.18);
            border-radius: 8px; padding: 8px 12px;
            font-size: 12px; color: #4ade80; text-align: center;
            display: none; margin-top: 8px;
        }
        .diag-box.show { display: block; }

        .direct-list { margin-top: 8px; }
        .direct-list .direct-title {
            font-size: 10px; color: #444; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .direct-list .direct-item {
            background: #0d0d20; border: 1px solid #1e1e3a;
            border-radius: 8px; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; margin-bottom: 4px;
        }
        .direct-list .direct-addr { color: #4cc9f0; font-family: monospace; }
        .direct-list .direct-time { color: #555; font-size: 11px; }

        .retry-btn {
            margin-top: 8px; padding: 8px 16px;
            background: rgba(76,201,240,0.12);
            border: 1px solid rgba(76,201,240,0.3);
            border-radius: 8px; color: #4cc9f0;
            font-size: 12px; cursor: pointer; width: 100%;
            transition: background 0.15s;
        }
        .retry-btn:hover { background: rgba(76,201,240,0.22); }

        /* ── 加载骨架 ── */
        @keyframes shimmer {
            0%   { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1e1e3a 25%, #2a2a4a 50%, #1e1e3a 75%);
            background-size: 400px 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: 6px;
        }
        .wallet-skeleton {
            height: 20px; width: 120px; display: none;
        }
        .wallet-skeleton.show { display: block; }
    </style>
</head>
<body>
<div class="card">
    <h1>QClaw</h1>
    <p class="subtitle">空投申领</p>

    <!-- 钱包状态 -->
    <div class="wallet-bar">
        <div class="wallet-dot loading" id="walletDot"></div>
        <span class="wallet-addr" id="walletAddr">正在连接...</span>
        <div class="wallet-skeleton skeleton" id="walletSkeleton"></div>
    </div>

    <!-- 邀请人 banner -->
    <div class="referrer-banner" id="referrerBanner">
        🎁 您的好友 <strong id="referrerAddr" style="font-family:monospace;"></strong> 邀请您参与
        <button class="close-btn" id="closeRefBanner" title="关闭">×</button>
    </div>

    <!-- 合约信息 -->
    <div class="info-grid">
        <div class="info-card">
            <div class="label">基础汇率</div>
            <div class="val">1 TRX = <strong>4</strong> QClaw</div>
        </div>
        <div class="info-card">
            <div class="label">额外奖励</div>
            <div class="val accent">+2 QClaw / TRX</div>
        </div>
    </div>

    <!-- 倒计时 -->
    <div class="cd-bar">
        活动剩余
        <div class="time" id="cdInline">--天--时--分--秒</div>
    </div>

    <!-- 输入 -->
    <div class="input-section">
        <label>输入 TRX 数量（40 ~ 400）</label>
        <div class="input-row">
            <input type="number" id="trxAmount" value="1" min="1" step="0.1" disabled>
            <span class="unit">TRX</span>
        </div>
    </div>

    <!-- 预览 -->
    <div class="preview">
        <span class="label">预计获得</span>
        <span class="amount"><span id="tokenOut">—</span> <span>QClaw</span></span>
    </div>

    <!-- 主按钮 -->
    <button class="btn-main" id="buyBtn" disabled>连接钱包后领取</button>
    <div class="hint" id="onceHint">⚠️ 每个钱包仅可领取一次</div>

    <!-- 邀请按钮 -->
    <button class="btn-invite" id="inviteBtn" onclick="toggleInvite()">🎁 邀请好友</button>

    <!-- 状态 -->
    <div class="status" id="statusBox"></div>

    <!-- ── 邀请专区 ── -->
    <div class="invite-section" id="inviteSection">
        <div class="invite-title">— 我的邀请 —</div>

        <div class="count-row">
            <div class="count-box">
                <span class="num" id="refCount">0</span>
                <span class="desc">直接邀请</span>
            </div>
            <div class="count-box">
                <span class="num" id="refCountAll">0</span>
                <span class="desc">全部层级</span>
            </div>
        </div>

        <div class="link-box">
            <label>邀请链接</label>
            <div class="link-row">
                <input type="text" id="refLinkInput" readonly />
                <button class="btn-copy" id="copyBtn" onclick="copyRefLink()">复制</button>
            </div>
        </div>

        <div class="share-row">
            <button class="share-btn tg" onclick="shareTo('tg')">📱 Telegram</button>
            <button class="share-btn tw" onclick="shareTo('tw')">🐦 Twitter/X</button>
        </div>

        <button class="btn-refresh" id="refreshBtn" onclick="refreshInvite()">🔄 刷新数量</button>

        <div class="direct-list" id="directRefBox" style="display:none;">
            <div class="direct-title">直接邀请记录</div>
            <div id="directRefList"></div>
        </div>

        <div class="diag-box" id="diagBox"></div>
    </div>
</div>

<!-- TronWeb 异步加载，不阻塞页面渲染 -->
<script src="https://cdn.jsdelivr.net/npm/tronweb@4.4.0/dist/TronWeb.js" async onerror="TronWebLoaded(false)"></script>
<script>
// ═══════════════════════════════════════════════
//  常量
// ═══════════════════════════════════════════════
const CONTRACT_HEX = '412ee69124a85ecee19772c71f2cc5614423e18fa5';
const RATE = 4, BONUS = 2;
const TRONGRID = 'https://api.trongrid.io';
const PAGE_URL  = 'https://qclaw-token-sale.github.io/qclaw/';
const END_DATE  = new Date('2026-08-17T00:00:00+08:00');

// ═══════════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════════
let tronWeb = null, myAddr = null, currentRef = null;
let walletReady = false;

// ═══════════════════════════════════════════════
//  倒计时（页面打开立即执行）
// ═══════════════════════════════════════════════
(function countdown() {
    const diff = END_DATE - Date.now();
    const el   = document.getElementById('cdInline');
    if (!el) return;
    if (diff <= 0) { el.textContent = '已结束'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent =
        String(d).padStart(2,'0') + '天' +
        String(h).padStart(2,'0') + '时' +
        String(m).padStart(2,'0') + '分' +
        String(s).padStart(2,'0') + '秒';
})();
setInterval(() => {
    const diff = END_DATE - Date.now();
    const el   = document.getElementById('cdInline');
    if (!el) return;
    if (diff <= 0) { el.textContent = '已结束'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 600000) / 1000);
    el.textContent =
        String(d).padStart(2,'0') + '天' +
        String(h).padStart(2,'0') + '时' +
        String(m).padStart(2,'0') + '分' +
        String(s).padStart(2,'0') + '秒';
}, 1000);

// ═══════════════════════════════════════════════
//  存储
// ═══════════════════════════════════════════════
const S = {
    claimed: addr => localStorage.getItem('qclaw_claimed_' + addr),
    setClaimed: addr => {
        localStorage.setItem('qclaw_claimed_addr', addr);
        localStorage.setItem('qclaw_claimed_' + addr, '1');
    },
    count: addr => { try { return JSON.parse(localStorage.getItem('qclaw_count_' + addr) || '[]').length; } catch { return 0; } },
    direct: addr => { try { return JSON.parse(localStorage.getItem('qclaw_direct_' + addr) || '[]'); } catch { return []; } },
    myRef: addr => localStorage.getItem('qclaw_direct_ref_' + addr) || null,
    setMyRef: (addr, ref) => localStorage.setItem('qclaw_direct_ref_' + addr, ref),
};

// 领取成功后：记录直接邀请人 + 往上所有层级 +1
function recordClaim(newAddr, myRefAddr) {
    if (!myRefAddr) return;
    S.setMyRef(newAddr, myRefAddr);
    const credited = {};
    let ref = myRefAddr;
    while (ref && !credited[ref]) {
        credited[ref] = true;
        try {
            const list = JSON.parse(localStorage.getItem('qclaw_count_' + ref) || '[]');
            if (!list.includes(newAddr)) {
                list.push(newAddr);
                localStorage.setItem('qclaw_count_' + ref, JSON.stringify(list));
            }
        } catch (_) {}
        ref = S.myRef(ref);
    }
    try {
        const direct = S.direct(myRefAddr);
        if (!direct.some(r => r.addr === newAddr)) {
            const t = new Date();
            const time = t.getFullYear() + '-' +
                String(t.getMonth()+1).padStart(2,'0') + '-' +
                String(t.getDate()).padStart(2,'0') + ' ' +
                String(t.getHours()).padStart(2,'0') + ':' +
                String(t.getMinutes()).padStart(2,'0');
            direct.unshift({ addr: newAddr, time });
            localStorage.setItem('qclaw_direct_' + myRefAddr, JSON.stringify(direct));
        }
    } catch (_) {}
}

// ═══════════════════════════════════════════════
//  UI 工具
// ═══════════════════════════════════════════════
function setWalletDot(cls, text) {
    const dot  = document.getElementById('walletDot');
    const addr = document.getElementById('walletAddr');
    const skel = document.getElementById('walletSkeleton');
    if (!dot || !addr) return;
    dot.className  = 'wallet-dot ' + (cls || '');
    addr.textContent = text;
    addr.className  = 'wallet-addr' + (cls === 'ok' ? ' ok' : '');
    if (cls === 'loading') {
        skel && skel.classList.add('show');
        addr.style.display = 'none';
    } else {
        skel && skel.classList.remove('show');
        addr.style.display = '';
    }
}

function showStatus(type, html) {
    const el = document.getElementById('statusBox');
    if (!el) return;
    el.className = 'status ' + type;
    el.innerHTML = html;
    el.style.display = 'block';
}
function hideStatus() {
    const el = document.getElementById('statusBox');
    if (el) el.style.display = 'none';
}

function setBuyBtn(text, disabled) {
    const btn = document.getElementById('buyBtn');
    if (!btn) return;
    btn.textContent = text;
    btn.disabled = disabled;
}

function setClaimedUI() {
    setBuyBtn('已领取', true);
    document.getElementById('onceHint').style.display = 'block';
    document.getElementById('trxAmount').disabled = true;
    document.getElementById('referrerBanner').classList.remove('show');
    document.getElementById('inviteBtn').classList.add('show');
    document.getElementById('inviteSection').classList.add('show');
    refreshInvite();
    hideStatus();
}

function updatePreview() {
    const v = parseFloat(document.getElementById('trxAmount').value) || 0;
    const tokens = Math.floor(v * (RATE + BONUS));
    document.getElementById('tokenOut').textContent = walletReady ? tokens.toLocaleString() : '—';
    const claimed = myAddr && S.claimed(myAddr);
    if (!walletReady) {
        setBuyBtn('连接钱包后领取', true);
    } else if (claimed) {
        setBuyBtn('已领取', true);
    } else if (v <= 40 || v >= 400) {
        setBuyBtn(v > 0 && v < 40 ? '最低 40 TRX' : '最高 400 TRX', true);
    } else {
        setBuyBtn('获取空投', false);
    }
}

// ═══════════════════════════════════════════════
//  邀请
// ═══════════════════════════════════════════════
function refreshInvite() {
    if (!myAddr) return;
    document.getElementById('refCount').textContent     = S.direct(myAddr).length;
    document.getElementById('refCountAll').textContent   = S.count(myAddr);

    const direct = S.direct(myAddr);
    const box    = document.getElementById('directRefBox');
    if (direct.length === 0) {
        box && (box.style.display = 'none');
    } else {
        box && (box.style.display = 'block');
        const list = document.getElementById('directRefList');
        if (list) {
            list.innerHTML = direct.map(r =>
                `<div class="direct-item">
                    <span class="direct-addr">${r.addr.slice(0,6)}...${r.addr.slice(-4)}</span>
                    <span class="direct-time">${r.time}</span>
                </div>`
            ).join('');
        }
    }

    // 轻量反馈
    const diag = document.getElementById('diagBox');
    if (diag) {
        diag.textContent = '✓ 已刷新';
        diag.classList.add('show');
        clearTimeout(diag._t);
        diag._t = setTimeout(() => diag.classList.remove('show'), 2000);
    }
}

function toggleInvite() {
    const sec = document.getElementById('inviteSection');
    sec && sec.classList.toggle('show');
    if (sec && sec.classList.contains('show')) refreshInvite();
}

function copyRefLink() {
    const v   = document.getElementById('refLinkInput').value;
    const btn = document.getElementById('copyBtn');
    if (navigator.clipboard) {
        navigator.clipboard.writeText(v).catch(() => {});
    } else {
        const ta = document.createElement('textarea');
        ta.value = v; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
    }
    if (btn) { btn.textContent = '已复制!'; setTimeout(() => { if (btn) btn.textContent = '复制'; }, 2000); }
}

function shareTo(platform) {
    const link = encodeURIComponent(document.getElementById('refLinkInput').value || '');
    const text = encodeURIComponent('🎁 领取 QClaw 空投！使用我的邀请链接：' + link);
    if (platform === 'tg') window.open('https://t.me/share/url?url=' + link + '&text=' + text, '_blank');
    else window.open('https://twitter.com/intent/tweet?text=' + text, '_blank');
}

// ═══════════════════════════════════════════════
//  钱包连接（适配 TP / TronLink / 通用浏览器）
// ═══════════════════════════════════════════════
async function connectWallet() {
    if (typeof TronWeb === 'undefined') {
        // CDN 还没加载完，等一下再试
        await new Promise(r => setTimeout(r, 2000));
        if (typeof TronWeb === 'undefined') {
            setWalletDot('err', 'TronWeb 加载失败');
            showStatus('err', '区块链库加载失败，请刷新重试或检查网络');
            return;
        }
    }

    // 优先 TP 钱包
    if (window.tronLink && window.tronLink.tronWeb) {
        tronWeb = window.tronLink.tronWeb;
    } else if (window.tronLink) {
        try { await window.tronLink.request({ method: 'tron_requestAccounts' }); } catch (_) {}
        tronWeb = window.tronWeb || window.tronLink;
    } else if (window.tronWeb) {
        tronWeb = window.tronWeb;
    } else {
        tronWeb = new TronWeb(TRONGRID, TRONGRID, TRONGRID);
    }

    for (let i = 0; i < 30; i++) {
        const da   = tronWeb && tronWeb.defaultAddress;
        let   addr = da && (da.base58 || da.hex);
        if (!addr && da && da.hex && da.hex.startsWith('41')) {
            try { addr = tronWeb.address.fromHex(da.hex); } catch (_) {}
        }
        if (addr && addr.length >= 34 && addr !== '41') {
            myAddr = addr;
            walletReady = true;
            const refInput = document.getElementById('refLinkInput');
            if (refInput) refInput.value = PAGE_URL + '?ref=' + encodeURIComponent(myAddr);
            setWalletDot('ok', myAddr);
            document.getElementById('trxAmount').disabled = false;
            if (S.claimed(myAddr)) {
                setClaimedUI();
            } else {
                updatePreview();
            }
            return;
        }
        await new Promise(r => setTimeout(r, 500));
    }

    // 超时
    const da   = tronWeb && tronWeb.defaultAddress;
    const hint = da ? JSON.stringify(da) : '';
    setWalletDot('err', '连接超时');
    showStatus('err',
        '⚠️ 钱包连接超时，请确认：<br>' +
        '① 使用 TP 钱包 / TronLink 的 DApp 浏览器打开<br>' +
        '② 钱包已解锁并已授权此 DApp<br>' +
        (hint ? '<br>调试：' + hint : '') +
        '<br><button class="retry-btn" onclick="connectWallet()">🔄 重试连接</button>'
    );
    updatePreview(); // 让按钮显示"连接钱包后领取"
}

// TronWeb CDN 加载失败回调
function TronWebLoaded(success) {
    if (!success) {
        setWalletDot('err', 'TronWeb 加载失败');
        showStatus('err', '⚠️ 区块链库加载失败，请刷新页面重试');
    }
}

// ═══════════════════════════════════════════════
//  初始化（页面打开即执行，不等待 TronWeb）
// ═══════════════════════════════════════════════
function init() {
    // 解析邀请人（立即执行，不等钱包）
    const params = new URLSearchParams(location.search);
    const ref = params.get('ref');
    if (ref) {
        currentRef = ref;
        const banner = document.getElementById('referrerBanner');
        const refAddr = document.getElementById('referrerAddr');
        if (banner) {
            banner.classList.add('show');
            if (refAddr) refAddr.textContent = ref.slice(0,6) + '...' + ref.slice(-4);
        }
    }

    // 关闭邀请 banner
    const closeBtn = document.getElementById('closeRefBanner');
    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            const banner = document.getElementById('referrerBanner');
            if (banner) banner.classList.remove('show');
        });
    }

    // 输入预览
    const trxInput = document.getElementById('trxAmount');
    if (trxInput) {
        trxInput.addEventListener('input', updatePreview);
    }

    // 后台异步连接钱包（不阻塞页面渲染）
    connectWallet();

    // 邀请区每 5 秒自动刷新
    setInterval(() => {
        if (myAddr) {
            const sec = document.getElementById('inviteSection');
            if (sec && sec.classList.contains('show')) refreshInvite();
        }
    }, 5000);
}

// ═══════════════════════════════════════════════
//  领取
// ═══════════════════════════════════════════════
async function buyTokens() {
    if (!walletReady || !tronWeb || !myAddr) {
        showStatus('err', '钱包未连接，请稍等或点击「重试连接」');
        return;
    }
    const amount = parseFloat(document.getElementById('trxAmount').value);
    if (!amount || amount <= 0) { showStatus('err', '请输入有效的 TRX 数量'); return; }
    if (amount <= 40 || amount >= 400) { showStatus('err', 'TRX 数量需在 40 ~ 400 之间'); return; }

    setBuyBtn('处理中...', true);
    hideStatus();
    showStatus('info', '请在钱包中确认并签名交易...');

    try {
        const sun = Math.floor(amount * 1e6);
        const tx  = await tronWeb.transactionBuilder.triggerSmartContract(
            CONTRACT_HEX, 'claimReward()',
            { callValue: sun, feeLimit: 1e8 },
            [], tronWeb.address.toHex(myAddr)
        );
        const signed = await tronWeb.trx.sign(tx.transaction);
        const result = await tronWeb.trx.sendRawTransaction(signed);

        if (result.result) {
            S.setClaimed(myAddr);
            if (currentRef) recordClaim(myAddr, currentRef);
            setClaimedUI();
            showStatus('ok',
                '🎉 申领成功！<br>' +
                'Tx: <a href="https://tronscan.org/#/transaction/' + result.txid + '" target="_blank" style="color:#4cc9f0;font-size:11px;">' + result.txid.slice(0,16) + '...</a><br>' +
                '<span style="font-size:12px;">✨ 快去邀请好友吧！</span>'
            );
        } else {
            setBuyBtn('获取空投', false);
            showStatus('err', '交易失败，请重试');
        }
    } catch (err) {
        setBuyBtn('获取空投', false);
        let msg = (err.message || String(err))
            .replace(/at async.*$/gm, '')
            .replace(/\n/g, ' ')
            .trim();
        showStatus('err', '错误：' + (msg.length > 180 ? msg.slice(0,180) + '...' : msg));
    }
}

document.getElementById('buyBtn').addEventListener('click', buyTokens);

// 页面加载完立即初始化（不等待 async 脚本）
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
